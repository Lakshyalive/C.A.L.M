<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C.A.L.M. — AI Therapy Companion</title>
  <meta name="description" content="A compassionate AI therapy companion powered by evidence-based psychology and local AI models.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

  <style>
    /* ════════════════════════════════════════════════════
       DESIGN TOKENS
    ════════════════════════════════════════════════════ */
    :root {
      /* Background layers */
      --bg:           #09090f;
      --surface:      #0f1018;
      --surface-2:    #161824;
      --surface-3:    #1e2132;

      /* Borders */
      --border:       rgba(255,255,255,0.06);
      --border-md:    rgba(255,255,255,0.10);
      --border-hi:    rgba(255,255,255,0.16);

      /* Brand / Samantha colour */
      --violet:       #8b7ff5;
      --violet-dim:   rgba(139,127,245,0.12);
      --violet-glow:  rgba(139,127,245,0.22);

      /* State colours */
      --blue:         #60a5fa;   /* listening  */
      --blue-dim:     rgba(96,165,250,0.12);
      --amber:        #fbbf24;   /* thinking   */
      --amber-dim:    rgba(251,191,36,0.10);
      --green:        #34d399;   /* connected  */
      --rose:         #fb7185;   /* interrupt  */

      /* Text */
      --text:         #dde1e8;
      --text-dim:     #8892a4;
      --text-muted:   #4f5b73;

      /* Typography */
      --font:         'Inter', system-ui, sans-serif;
      --font-serif:   'Lora', Georgia, serif;

      /* Layout */
      --header-h:     58px;
      --panel-h:      158px;
      --radius:       12px;
      --radius-lg:    18px;
    }

    /* ════════════════════════════════════════════════════
       RESET
    ════════════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body               { height: 100%; overflow: hidden; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      display: flex;
      flex-direction: column;
      /* Subtle noise texture via SVG gradient */
      background-image:
        radial-gradient(ellipse 90% 40% at 50% -5%, rgba(139,127,245,0.05) 0%, transparent 70%);
    }

    /* ════════════════════════════════════════════════════
       HEADER
    ════════════════════════════════════════════════════ */
    #header {
      height: var(--header-h);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.4rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: relative;
      z-index: 50;
    }

    /* Logo */
    .logo {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      user-select: none;
    }

    .logo-mark {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: var(--violet-dim);
      border: 1px solid rgba(139,127,245,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-mark svg { width: 16px; height: 16px; color: var(--violet); }

    .logo-text {
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .logo-name {
      font-size: 0.88rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--text);
    }
    .logo-sub {
      font-size: 0.6rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* Header right */
    .header-right {
      display: flex;
      align-items: center;
      gap: 0.85rem;
    }

    #session-timer {
      font-size: 0.78rem;
      font-variant-numeric: tabular-nums;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }

    #conn-pill {
      display: flex;
      align-items: center;
      gap: 0.38rem;
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--text-muted);
      background: var(--surface-2);
      border: 1px solid var(--border-md);
      border-radius: 100px;
      padding: 0.28rem 0.75rem;
      transition: all 0.4s ease;
    }
    .conn-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      transition: background 0.4s ease, box-shadow 0.4s ease;
    }
    #conn-pill.live .conn-dot {
      background: var(--green);
      box-shadow: 0 0 7px rgba(52,211,153,0.55);
    }
    #conn-pill.live { color: var(--text-dim); }

    /* ════════════════════════════════════════════════════
       CHAT AREA
    ════════════════════════════════════════════════════ */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 2.2rem 0 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0;
      /* scrollbar */
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.07) transparent;
    }
    #chat::-webkit-scrollbar       { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.07);
      border-radius: 100px;
    }

    /* Fade-out mask at top and bottom */
    #chat-wrap {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      -webkit-mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent);
      mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent);
      overflow: hidden;
    }

    /* ── Message row ──────────────────────────────────── */
    .row {
      display: flex;
      gap: 0.7rem;
      padding: 0.45rem 1.4rem;
      max-width: 860px;
      margin: 0 auto;
      width: 100%;
      opacity: 0;
      animation: msgIn 0.38s cubic-bezier(0.22,1,0.36,1) forwards;
    }
    .row.user { flex-direction: row-reverse; }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    /* Avatar */
    .av {
      width: 28px; height: 28px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; font-weight: 600;
      margin-top: 3px;
    }
    .av.samantha {
      background: var(--violet-dim);
      border: 1px solid rgba(139,127,245,0.28);
      color: var(--violet);
    }
    .av.user {
      background: var(--surface-2);
      border: 1px solid var(--border-md);
      color: var(--text-dim);
    }

    /* Content column */
    .msg-col {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column;
      gap: 0.3rem;
    }
    .row.user .msg-col { align-items: flex-end; }

    /* Sender label */
    .sender {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .row.samantha .sender { color: rgba(139,127,245,0.55); }

    /* Bubble */
    .bubble {
      display: inline-block;
      border-radius: var(--radius-lg);
      line-height: 1.68;
      max-width: 100%;
    }

    /* Samantha: large serif prose, no background */
    .row.samantha .bubble {
      background: transparent;
      padding: 0.1rem 0;
      font-family: var(--font-serif);
      font-size: 1.38rem;
      color: #d8d3f8;
      max-width: 68ch;
    }

    /* User: compact glass bubble */
    .row.user .bubble {
      background: var(--surface-2);
      border: 1px solid var(--border-md);
      padding: 0.75rem 1.1rem;
      font-size: 0.9rem;
      font-weight: 400;
      color: var(--text-dim);
      border-bottom-right-radius: 5px;
      max-width: 55ch;
    }

    /* Typing cursor during stream */
    .cursor {
      display: inline-block;
      width: 2px; height: 1.1em;
      background: var(--violet);
      margin-left: 2px;
      vertical-align: text-bottom;
      opacity: 0.65;
      animation: blink 0.9s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ════════════════════════════════════════════════════
       BOTTOM PANEL
    ════════════════════════════════════════════════════ */
    #panel {
      flex-shrink: 0;
      height: var(--panel-h);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.65rem;
      padding-bottom: 0.8rem;
      background: linear-gradient(to top, var(--bg) 50%, transparent);
      position: relative;
    }

    /* Status label */
    #status {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
      min-height: 1em;
      transition: color 0.4s ease;
    }

    /* ── Mic button ────────────────────────────────────── */
    #mic {
      position: relative;
      width: 60px; height: 60px;
      border-radius: 50%;
      border: 1.5px solid var(--border-md);
      background: var(--surface-2);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition:
        background   0.4s ease,
        border-color 0.4s ease,
        box-shadow   0.4s ease,
        transform    0.18s ease;
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }
    #mic:active { transform: scale(0.93); }

    /* Expanding ring */
    #mic::after {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1.5px solid transparent;
      transition: border-color 0.4s ease;
      pointer-events: none;
      animation: none;
    }

    /* Icon layers */
    .icon-mic, .icon-stop, .icon-dots {
      position: absolute;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .icon-dots {
      display: flex; gap: 4px; align-items: center;
    }
    .icon-dots span {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--amber);
      animation: dotBounce 1.1s ease-in-out infinite;
      display: block;
    }
    .icon-dots span:nth-child(2) { animation-delay: 0.15s; }
    .icon-dots span:nth-child(3) { animation-delay: 0.30s; }
    @keyframes dotBounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.35; }
      40%            { transform: translateY(-5px); opacity: 1; }
    }

    /* ════════ State: IDLE ════════ */
    body.s-idle #status        { color: var(--text-muted); }
    body.s-idle #mic           { border-color: var(--border-md); }
    body.s-idle .icon-mic      { opacity: 1; color: var(--text-dim); }
    body.s-idle .icon-stop     { opacity: 0; }
    body.s-idle .icon-dots     { opacity: 0; }

    /* ════════ State: LISTENING ════════ */
    body.s-listening #status        { color: var(--blue); }
    body.s-listening #mic           {
      background:    var(--blue-dim);
      border-color:  rgba(96,165,250,0.55);
      box-shadow:    0 0 0 0 rgba(96,165,250,0.3);
      animation:     listenPulse 1.6s ease-in-out infinite;
    }
    body.s-listening #mic::after    {
      border-color: rgba(96,165,250,0.2);
      animation:    ringPop 1.6s ease-out infinite;
    }
    body.s-listening .icon-mic      { opacity: 1; color: var(--blue); }
    body.s-listening .icon-stop     { opacity: 0; }
    body.s-listening .icon-dots     { opacity: 0; }

    /* ════════ State: THINKING ════════ */
    body.s-thinking #status     { color: var(--amber); }
    body.s-thinking #mic        {
      background:   var(--amber-dim);
      border-color: rgba(251,191,36,0.4);
      cursor: default;
    }
    body.s-thinking .icon-mic   { opacity: 0; }
    body.s-thinking .icon-stop  { opacity: 0; }
    body.s-thinking .icon-dots  { opacity: 1; }

    /* ════════ State: SPEAKING ════════ */
    body.s-speaking #status       { color: var(--violet); }
    body.s-speaking #mic          {
      background:   var(--violet-dim);
      border-color: rgba(139,127,245,0.6);
      box-shadow:   0 0 22px rgba(139,127,245,0.18);
      animation:    speakGlow 2.2s ease-in-out infinite;
      cursor: pointer;
    }
    body.s-speaking #mic::after   {
      border-color: rgba(139,127,245,0.18);
      animation: ringPop 2.2s ease-out infinite;
    }
    body.s-speaking .icon-mic     { opacity: 1; color: var(--violet); }
    body.s-speaking .icon-stop    { opacity: 0; }
    body.s-speaking .icon-dots    { opacity: 0; }

    /* Hover while speaking: show "stop / interrupt" icon */
    body.s-speaking #mic:hover .icon-mic  { opacity: 0; }
    body.s-speaking #mic:hover .icon-stop { opacity: 1; }
    body.s-speaking #mic:hover            {
      background:   rgba(251,113,133,0.12);
      border-color: rgba(251,113,133,0.5);
      box-shadow:   0 0 22px rgba(251,113,133,0.15);
    }

    /* Hover while listening: brightens to signal it's clickable */
    body.s-listening #mic:hover {
      background:   rgba(96,165,250,0.22);
      border-color: rgba(96,165,250,0.75);
      box-shadow:   0 0 18px rgba(96,165,250,0.2);
    }

    /* ── Keyframes ─────────────────────────────────────── */
    @keyframes listenPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(96,165,250,0.3); }
      50%       { box-shadow: 0 0 0 7px rgba(96,165,250,0); }
    }
    @keyframes speakGlow {
      0%, 100% { box-shadow: 0 0 18px rgba(139,127,245,0.15); }
      50%       { box-shadow: 0 0 30px rgba(139,127,245,0.28); }
    }
    @keyframes ringPop {
      0%   { inset: -3px;  opacity: 0.5; }
      100% { inset: -18px; opacity: 0; }
    }

    /* Bottom caption */
    #panel-caption {
      font-size: 0.6rem;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      opacity: 0.55;
    }

    /* ════════════════════════════════════════════════════
       RECONNECTING BANNER
    ════════════════════════════════════════════════════ */
    #banner {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 0.45rem 1rem;
      background: rgba(251,113,133,0.09);
      border-top: 1px solid rgba(251,113,133,0.22);
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      text-align: center;
      color: var(--rose);
      z-index: 999;
    }
    #banner.show { display: block; }

    /* ════════════════════════════════════════════════════
       RESPONSIVE — tighten on small screens
    ════════════════════════════════════════════════════ */
    @media (max-width: 520px) {
      .row.samantha .bubble { font-size: 1.2rem; }
      #panel { --panel-h: 148px; }
    }
  </style>
</head>

<body class="s-idle">

  <!-- ── Header ──────────────────────────────────────── -->
  <header id="header">
    <div class="logo">
      <div class="logo-mark">
        <!-- Leaf / mind icon -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2C6.5 2 2 6.5 2 12c0 2.8 1.1 5.3 2.9 7.1"/>
          <path d="M12 22c5.5 0 10-4.5 10-10 0-2.8-1.1-5.3-2.9-7.1"/>
          <line x1="12" y1="12" x2="12" y2="22"/>
        </svg>
      </div>
      <div class="logo-text">
        <div class="logo-name">C.A.L.M.</div>
        <div class="logo-sub">AI Therapy Companion</div>
      </div>
    </div>

    <div class="header-right">
      <div id="session-timer">00:00</div>
      <div id="conn-pill">
        <div class="conn-dot"></div>
        <span id="conn-label">Connecting</span>
      </div>
    </div>
  </header>

  <!-- ── Chat ────────────────────────────────────────── -->
  <div id="chat-wrap">
    <div id="chat"></div>
  </div>

  <!-- ── Bottom Panel ────────────────────────────────── -->
  <div id="panel">
    <div id="status">Connecting…</div>

    <button id="mic" onclick="onMicClick()" aria-label="Microphone — click to interrupt while Samantha is speaking">

      <!-- Mic icon (idle / listening / speaking default) -->
      <svg class="icon-mic" width="22" height="22" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="2" width="6" height="12" rx="3"/>
        <path d="M5 10a7 7 0 0 0 14 0"/>
        <line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="8"  y1="22" x2="16" y2="22"/>
      </svg>

      <!-- Stop icon (shown on hover during speaking) -->
      <svg class="icon-stop" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"
           style="color: var(--rose);">
        <rect x="4" y="4" width="16" height="16" rx="3"/>
      </svg>

      <!-- Thinking dots -->
      <div class="icon-dots" aria-hidden="true">
        <span></span><span></span><span></span>
      </div>

    </button>

    <div id="panel-caption">Llama 3.2 · Kokoro TTS · Evidence-based RAG</div>
  </div>

  <!-- Reconnect banner -->
  <div id="banner">⚠ Connection lost — reconnecting…</div>


  <script>
    /* ── Elements ──────────────────────────────────────── */
    const chat        = document.getElementById('chat');
    const statusEl    = document.getElementById('status');
    const connPill    = document.getElementById('conn-pill');
    const connLabel   = document.getElementById('conn-label');
    const timerEl     = document.getElementById('session-timer');
    const banner      = document.getElementById('banner');

    /* ── App state ─────────────────────────────────────── */
    let streamBubble = null;   // Active <div> receiving streamed tokens
    let streamCursor = null;   // Blinking cursor element
    let appState     = 'idle';
    let sessionStart = null;
    let timerInt     = null;
    let ws           = null;

    /* ── Status text map ───────────────────────────────── */
    const STATUS = {
      idle:      'Awaiting your voice',
      listening: 'Listening…  ·  click mic to finish',
      thinking:  'Thinking…',
      speaking:  'Speaking  ·  click to interrupt',
    };

    /* ── Session timer ─────────────────────────────────── */
    function startTimer() {
      if (timerInt) return;
      sessionStart = Date.now();
      timerInt = setInterval(() => {
        const s  = Math.floor((Date.now() - sessionStart) / 1000);
        const m  = Math.floor(s / 60);
        const ss = s % 60;
        timerEl.textContent = `${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
      }, 1000);
    }

    /* ── State setter ──────────────────────────────────── */
    function setState(s) {
      appState = s;
      document.body.className = `s-${s}`;
      statusEl.textContent = STATUS[s] ?? '';
      // Finalise any streaming bubble when leaving speaking
      if (s !== 'speaking') finishStream();
    }

    /* ── Streaming helpers ─────────────────────────────── */
    function finishStream() {
      if (streamCursor?.parentNode) streamCursor.parentNode.removeChild(streamCursor);
      streamCursor = null;
      streamBubble = null;
    }

    /* ── Build a message row and return the bubble <div> ─ */
    function addMessage(role, text) {
      const row = document.createElement('div');
      row.className = `row ${role}`;

      // Avatar
      const av = document.createElement('div');
      av.className = `av ${role}`;
      av.textContent = role === 'samantha' ? 'S' : 'Y';

      // Content column
      const col = document.createElement('div');
      col.className = 'msg-col';

      const sender = document.createElement('div');
      sender.className = 'sender';
      sender.textContent = role === 'samantha' ? 'Samantha' : 'You';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;

      col.appendChild(sender);
      col.appendChild(bubble);
      row.appendChild(av);
      row.appendChild(col);
      chat.appendChild(row);

      scrollBottom();
      return bubble;
    }

    function scrollBottom() {
      requestAnimationFrame(() =>
        chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' })
      );
    }

    /* ── Mic button ───────────────────────────── */
    function onMicClick() {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;

      if (appState === 'listening') {
        // Secondary ‘done’ button — stop recording and transcribe immediately
        ws.send(JSON.stringify({ action: 'done_listening' }));
        // Snap UI for instant feedback
        appState = 'thinking';
        document.body.className = 's-thinking';
        statusEl.textContent = 'Processing…';

      } else if (appState === 'speaking' || appState === 'thinking') {
        // Interrupt Samantha mid-response
        ws.send(JSON.stringify({ action: 'interrupt' }));
        setState('listening');
        statusEl.textContent = 'Interrupted — listening…';
      }
      // idle: button is informational only
    }

    /* ── WebSocket with auto-reconnect ─────────────────── */
    function connect() {
      ws = new WebSocket(`ws://${location.host}/ws`);

      ws.onopen = () => {
        connPill.className  = 'live';
        connLabel.textContent = 'Live';
        banner.classList.remove('show');
        setState('idle');
        startTimer();
      };

      ws.onclose = () => {
        connPill.className  = '';
        connLabel.textContent = 'Reconnecting';
        banner.classList.add('show');
        setTimeout(connect, 3000);
      };

      ws.onerror = () => ws.close();

      ws.onmessage = ({ data }) => {
        let msg;
        try { msg = JSON.parse(data); } catch { return; }

        /* state ─ update orb + label */
        if (msg.type === 'state') {
          setState(msg.value);
        }

        /* transcript ─ full static message
           Used for: opening greeting, user speech, farewell, crisis response.
           Samantha's main reply is built via 'stream' tokens instead. */
        else if (msg.type === 'transcript') {
          addMessage(msg.role, msg.text);
        }

        /* stream ─ real-time LLM token
           First token creates the Samantha bubble; subsequent tokens append. */
        else if (msg.type === 'stream') {
          if (!streamBubble) {
            streamBubble = addMessage('samantha', '');
            streamCursor = document.createElement('span');
            streamCursor.className = 'cursor';
            streamBubble.appendChild(streamCursor);
          }
          streamBubble.insertBefore(
            document.createTextNode(msg.token),
            streamCursor
          );
          scrollBottom();
        }
      };
    }

    connect();
